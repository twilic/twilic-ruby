name: Publish Gem

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify tag matches VERSION constant
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version=$(ruby -r ./lib/twilic/version -e 'puts Twilic::VERSION')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "Tag $tag does not match lib/twilic/version.rb ($expected)"
            exit 1
          fi

      - name: Run tests
        run: bundle exec rake test

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      # Trusted Publishing (OIDC): configure a trusted publisher on RubyGems.org
      # (repository twilic/twilic-ruby, workflow file publish-gem.yml).
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Build gem
        run: gem build twilic.gemspec

      - name: Publish gem
        run: gem push twilic-*.gem
